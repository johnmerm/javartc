<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>JavaRTC</title>
  <style>
    body { font-family: sans-serif; margin: 2rem; }
    video { width: 320px; height: 240px; background: #000; border: 1px solid #ccc; }
    .videos { display: flex; gap: 1rem; margin-bottom: 1rem; }
    label { display: block; margin-bottom: 0.25rem; color: #555; font-size: 0.85rem; }
  </style>
</head>
<body>
  <h1>JavaRTC</h1>
  <div class="videos">
    <div><label>Local</label><video id="localVideo" autoplay muted playsinline></video></div>
    <div><label>Remote</label><video id="remoteVideo" autoplay playsinline></video></div>
  </div>
  <button id="callBtn">📞 Start Call</button>
  <script src="vertxRTC.js"></script>
</body>
</html>
