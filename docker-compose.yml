services:

  coturn:
    image: coturn/coturn:latest
    network_mode: host          # simplest for local dev; use ports: mapping for prod
    command: >
      -n
      --log-file=stdout
      --lt-cred-mech
      --realm=javartc.local
      --user=javartc:javartc
      --no-tls
      --no-dtls
      --listening-port=3478

  javartc:
    image: javartc-javartc:latest
    network_mode: host
    environment:
      SPRING_APPLICATION_JSON: >
        {"turn":{"uri":"turn:127.0.0.1:3478","username":"javartc","credential":"javartc"}}
      DISPLAY: "${DISPLAY:-:0}"
      XAUTHORITY: "/root/.Xauthority"
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix
      - "${XAUTHORITY:-${HOME}/.Xauthority}:/root/.Xauthority:ro"
      # Static sources mounted for live HTML/JS edits (browser hard-refresh is enough)
      - ./src/main/resources/static:/app/static:ro
      # NOTE: JAR is no longer mounted from the host — it is built inside the Docker image
      # (multi-stage build). Rebuild with: docker build -t javartc-javartc:latest .
    depends_on:
      - coturn
